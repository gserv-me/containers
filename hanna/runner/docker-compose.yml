services:
  hanna-runner-dind:
    image: docker:dind
    container_name: "hanna-runner-dind"

    privileged: true
    hostname: hanna-runner-dind

    restart: "unless-stopped"

    volumes:
      - certs:/certs

  hanna-runner:
    image: "data.forgejo.org/forgejo/runner:12"
    container_name: "hanna-runner"

    command: "forgejo-runner daemon --config /data/runner-config.yml"
    restart: "unless-stopped"

    links:
      - hanna-runner-dind

    depends_on:
      hanna-runner-dind:
        condition: service_started

    environment:
      - DOCKER_HOST=tcp://hanna-runner-dind:2376
      - DOCKER_TLS_VERIFY=1
      - DOCKER_CERT_PATH=/certs/client

    # User without root privileges, but with access to `./data`.
    user: 1001:1001

    volumes:
      - /srv/docker/hanna/runner/data:/data
      - certs:/certs

volumes:
  certs:
