name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}

    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /srv/docker/gserv/immich/external:/mnt/external
      - /etc/localtime:/etc/localtime:ro

    labels:
      # HTTP
      - "traefik.http.routers.immich_http.entrypoints=web"
      - "traefik.http.routers.immich_http.rule=Host(`immich.gareth-coles.dev`)"
      - "traefik.http.routers.immich_http.middlewares=https"
      - "traefik.http.middlewares.https.redirectscheme.scheme=https"

      # HTTPS
      - "traefik.http.routers.immich.rule=Host(`immich.gareth-coles.dev`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=letsencrypt"
      - "traefik.http.routers.immich.service=immich"

      # Load Balancer
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      - "traefik.http.services.immich.loadbalancer.server.scheme=http"

    networks:
      - web
      - immich

    environment:
      - IMMICH_VERSION
      - DB_DATA_LOCATION
      - DB_PASSWORD
      - DB_USERNAME
      - DB_DATABASE_NAME
      - TZ
      - UPLOAD_LOCATION

    depends_on:
      - redis
      - database

    restart: unless-stopped

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}

    volumes:
      - model-cache:/cache

    networks:
      - immich

    environment:
      - IMMICH_VERSION
      - DB_DATA_LOCATION
      - DB_PASSWORD
      - DB_USERNAME
      - DB_DATABASE_NAME
      - TZ
      - UPLOAD_LOCATION

    restart: unless-stopped

  redis:
    container_name: immich_redis
    image: docker.io/library/redis:alpine

    networks:
      - immich

    healthcheck:
      test: redis-cli ping || exit 1

    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0

    networks:
      - immich

    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      DB_STORAGE_TYPE: 'HDD'

    shm_size: 128mb

    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  model-cache:

networks:
  web:
    external: true

  immich:
    driver: bridge
    name: immich
